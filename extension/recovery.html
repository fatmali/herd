<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Herd — Where was I?</title>
  <style>
    :root {
      --white: #FFFFFF;
      --bg: #FAFBFA;
      --green: #22A65C;
      --green-soft: rgba(34, 166, 92, 0.08);
      --green-mid: rgba(34, 166, 92, 0.15);
      --charcoal: #1A1A1A;
      --grey: #6B7280;
      --grey-light: #9CA3AF;
      --border: #F0F1F0;
      --card-bg: #FFFFFF;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 32px 48px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-left .emoji {
      font-size: 26px;
    }

    .header-subtitle {
      font-size: 14px;
      color: var(--grey);
      font-weight: 400;
    }

    /* Timeline */
    .timeline-section {
      padding: 28px 48px 20px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--grey-light);
      margin-bottom: 14px;
    }

    .timeline-wrapper {
      position: relative;
    }

    .timeline-scroll-hint {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      transition: opacity 0.2s, transform 0.2s;
      color: var(--grey);
      font-size: 14px;
    }

    .timeline-scroll-hint:hover {
      transform: translateY(-50%) scale(1.1);
      border-color: var(--green);
      color: var(--green);
    }

    .timeline-scroll-hint.left { left: -16px; }
    .timeline-scroll-hint.right { right: -16px; }
    .timeline-scroll-hint.hidden { opacity: 0; pointer-events: none; }

    .timeline {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 40px 0 12px;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 34px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }

    .timeline::-webkit-scrollbar {
      height: 0;
    }

    .timeline-card {
      flex-shrink: 0;
      width: 180px;
      scroll-snap-align: start;
      cursor: pointer;
      transition: transform 0.15s ease;
      position: relative;
      z-index: 1;
      padding: 0 8px;
    }

    .timeline-card:hover {
      transform: translateY(-3px);
    }

    .timeline-card::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--bg);
    }

    .timeline-card:first-child::before {
      background: var(--green);
      box-shadow: 0 0 0 3px var(--green-soft);
    }

    .timeline-card:first-child::after {
      content: 'Now';
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--green);
      font-weight: 600;
    }

    .timeline-thumb {
      width: 100%;
      height: 108px;
      border-radius: 10px;
      background: var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .timeline-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .timeline-thumb-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--card-bg);
    }

    .timeline-thumb-fallback img {
      width: 24px;
      height: 24px;
    }

    .timeline-thumb-fallback span {
      font-size: 10px;
      color: var(--grey);
      max-width: 90%;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-meta {
      padding: 8px 2px 0;
    }

    .timeline-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--charcoal);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-time {
      font-size: 11px;
      color: var(--grey-light);
      margin-top: 2px;
    }

    /* Herds grid */
    .herds-section {
      padding: 12px 48px 48px;
    }

    .herds-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .herd-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow-sm);
    }

    .herd-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 4px;
    }

    .herd-color-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .herd-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--charcoal);
      border: none;
      background: none;
      outline: none;
      padding: 0;
      font-family: inherit;
      cursor: text;
      border-bottom: 1px dashed transparent;
      transition: border-color 0.2s;
    }

    .herd-name:hover {
      border-bottom-color: var(--border);
    }

    .herd-name:focus {
      border-bottom-color: var(--green);
    }

    .herd-tab-count {
      font-size: 12px;
      color: var(--grey-light);
      font-weight: 400;
    }

    .herd-note {
      display: block;
      width: 100%;
      border: none;
      background: none;
      outline: none;
      font-size: 13px;
      color: var(--grey);
      font-family: inherit;
      padding: 4px 0;
      margin-bottom: 14px;
      border-bottom: 1px dashed transparent;
      transition: border-color 0.2s, color 0.2s;
    }

    .herd-note:hover {
      border-bottom-color: var(--border);
    }

    .herd-note:focus {
      border-bottom-color: var(--green);
      color: var(--charcoal);
    }

    .herd-note::placeholder {
      color: var(--grey-light);
      font-style: italic;
    }

    .herd-tabs-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      padding-left: 20px;
    }

    .herd-tabs-list::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: var(--border);
      border-radius: 1px;
    }

    .tab-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .tab-row::before {
      content: '';
      position: absolute;
      left: -16px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--card-bg);
    }

    .tab-row:first-child::before {
      background: var(--green);
    }

    .tab-row:hover {
      background: var(--green-soft);
    }

    .tab-row-favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .tab-row-title {
      flex: 1;
      font-size: 13px;
      font-weight: 450;
      color: var(--charcoal);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-row-domain {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--grey-light);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-row-time {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--grey-light);
      min-width: 50px;
      text-align: right;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--grey);
    }

    .empty-state .emoji {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 8px;
    }

    /* Color map */
    .color-grey { background: #9CA3AF; }
    .color-blue { background: #4285f4; }
    .color-red { background: #ea4335; }
    .color-yellow { background: #fbbc04; }
    .color-green { background: #34a853; }
    .color-pink { background: #e91e8a; }
    .color-purple { background: #9334e6; }
    .color-cyan { background: #00bcd4; }
    .color-orange { background: #ff6d01; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50vh;
      color: var(--grey-light);
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header, .timeline-section, .herds-section {
        padding-left: 24px;
        padding-right: 24px;
      }
      .tab-card { width: 140px; }
      .timeline-card { width: 160px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="emoji">🐑</span>
      <div>
        <h1>Where was I?</h1>
        <div class="header-subtitle">Your tabs, as you left them.</div>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="loading">Loading your herds...</div>
  </div>

  <script src="recovery.js"></script>
</body>
</html>
